name: DE Electricity Regulation Monitor

on:
  schedule:
    # Runs every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regulation monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent.py

      - name: Commit seen-changes cache
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add .seen_changes.json || true
          git diff --cached --quiet || git commit -m "chore: update seen-changes cache [skip ci]"
          git push || true
